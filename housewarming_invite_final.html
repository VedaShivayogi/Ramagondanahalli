<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housewarming Invitation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d0d0d0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: #eef5f5;
    width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 40px 40px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.15);
  }

  .house-img {
    width: 100%;
    max-width: 520px;
    margin-bottom: 10px;
    display: block;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1.1;
    color: #1a1a1a;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 22px;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: #2a2a2a;
    text-align: center;
    line-height: 1.65;
    margin-bottom: 22px;
  }

  .date-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #1a1a1a;
    text-align: center;
    margin-bottom: 8px;
  }

  .address-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: #2a2a2a;
    text-align: center;
    margin-bottom: 6px;
  }

  .contact-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: #2a2a2a;
    text-align: center;
    margin-bottom: 18px;
  }

  .signature {
    font-family: 'Dancing Script', cursive;
    font-size: 26px;
    color: #1a1a1a;
    text-align: center;
    margin-top: 6px;
  }

  @media print {
    body { background: white; padding: 0; }
    .card { box-shadow: none; width: 100%; }
  }
</style>
</head>
